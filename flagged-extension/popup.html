<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #17191C; --paper: #F6F7F5; --card: #fff; --rule: #E3E5E0;
    --flag: #6D4AE6; --flag-bg: #F3EFFE; --dispute: #B0770F;
    --confirm: #4630B8; --muted: #7B8087;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    width: 360px; font-family: system-ui, sans-serif;
    background: var(--paper); color: var(--ink); font-size: 13px;
  }
  header {
    background: var(--card); border-bottom: 1px solid var(--rule);
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .wordmark { font-weight: 800; font-size: 17px; letter-spacing: -0.02em; }
  .wordmark span { color: var(--flag); }
  .url {
    font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted);
    max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  main { padding: 14px 16px 16px; }
  .status-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: 10px;
    padding: 12px; margin-bottom: 12px;
  }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; border-radius: 4px; padding: 3px 7px; border: 1.5px solid;
  }
  .badge.confirmed { color: var(--confirm); border-color: var(--confirm); }
  .badge.unverified { color: var(--muted); border-color: var(--muted); }
  .badge.contested, .badge.disputed { color: var(--dispute); border-color: var(--dispute); }
  .badge.clean { color: #177A4C; border-color: #177A4C; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .chip {
    font-size: 11px; background: var(--flag-bg); color: var(--confirm);
    border-radius: 4px; padding: 2px 7px;
  }
  .note { margin-top: 8px; line-height: 1.45; }
  .counts { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .row { display: flex; gap: 6px; margin-top: 10px; }
  button {
    cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 999px;
    padding: 6px 12px; border: 1.5px solid var(--rule); background: transparent; color: var(--ink);
  }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  button.primary { background: var(--flag); border-color: var(--flag); color: #fff; width: 100%; padding: 9px; font-size: 13px; }
  button.confirm { border-color: var(--flag); color: var(--flag); }
  button.confirm.active { background: var(--flag); color: #fff; }
  button.dispute { border-color: var(--dispute); color: var(--dispute); }
  button.dispute.active { background: var(--dispute); color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .label {
    font-family: ui-monospace, monospace; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin: 12px 0 6px;
  }
  .signals { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .sig {
    text-align: left; border-radius: 7px; padding: 7px 9px; font-weight: 500;
    border: 1.5px solid var(--rule); background: var(--card); font-size: 11.5px;
  }
  .sig.on { border-color: var(--flag); background: var(--flag-bg); color: var(--confirm); font-weight: 600; }
  textarea {
    width: 100%; border: 1.5px solid var(--rule); border-radius: 8px; background: var(--card);
    padding: 8px 10px; font-family: inherit; font-size: 12px; resize: none;
  }
  .err { color: #C43A3A; font-size: 12px; margin-top: 6px; }
  .fine { font-size: 10.5px; color: var(--muted); margin-top: 8px; text-align: center; }
</style>
</head>
<body>
  <header>
    <div class="wordmark">flagged<span>.ai</span></div>
    <div class="url" id="host"></div>
  </header>
  <main id="main">
    <div class="status-card" id="status">Checking this page…</div>
    <div id="flagform"></div>
  </main>
  <script src="db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
