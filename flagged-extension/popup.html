<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #17191C; --paper: #F6F7F5; --card: #fff; --rule: #E3E5E0;
    --on: #16A34A; --ai: #DC2626; --on-deep: #15803D; --on-soft: #E4F2E6;
    --alert: #DC2626; --alert-deep: #B91C1C;
    --muted: #7B8087; --ok: #16A34A;
    --purple: #534AB7; --purple-soft: #EEEDFE;
    --coral: #993C1D; --coral-soft: #FAECE7;
  }
  * { box-sizing: border-box; margin: 0; }
  body { width: 340px; font-family: system-ui, sans-serif; background: var(--paper); color: var(--ink); font-size: 13px; }

  header { background: var(--card); border-bottom: 1px solid var(--rule); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .wordmark { font-weight: 800; font-size: 16px; letter-spacing: -.01em; }
  .wordmark span { color: var(--ai); }
  .hgroup { display: flex; align-items: center; gap: 10px; }
  .url { font-family: ui-monospace, monospace; font-size: 10.5px; color: var(--muted); max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* compact power: same ring sweep, miniature */
  .power-wrap { position: relative; width: 42px; height: 42px; flex: none; }
  .ring { position: absolute; inset: 0; transform: rotate(-90deg); pointer-events: none; }
  .ring circle {
    fill: none; stroke: var(--on); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 118; stroke-dashoffset: 118;
    transition: stroke-dashoffset .55s cubic-bezier(.4,0,.2,1);
  }
  .power-wrap.on .ring circle { stroke-dashoffset: 0; }
  .power {
    position: absolute; inset: 4px; width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer; border: none; display: flex; align-items: center; justify-content: center;
    background: var(--ink); transition: background .3s, box-shadow .3s;
  }
  .power:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .power svg { width: 16px; height: 16px; stroke: #98A0A8; transition: stroke .25s; }
  .power.on { background: var(--on); box-shadow: 0 0 0 5px rgba(22,163,74,.12); }
  .power.on svg { stroke: #fff; }
  .power.attn { animation: halo 1.6s ease-out infinite; }
  .power.attn svg { stroke: var(--on); }
  @keyframes halo {
    0% { box-shadow: 0 0 0 0 rgba(22,163,74,.45); }
    70% { box-shadow: 0 0 0 11px rgba(22,163,74,0); }
    100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
  }
  .cta {
    border: none; cursor: pointer; flex: none;
    background: var(--on); color: #fff; font-weight: 700; font-size: 12px;
    border-radius: 999px; padding: 7px 12px;
    animation: nudge 1.6s ease-in-out infinite;
  }
  .cta:hover { background: var(--on-deep); }
  @keyframes nudge { 0%,100% { transform: translateX(0) } 50% { transform: translateX(3px) } }
  @media (prefers-reduced-motion: reduce) { .power.attn, .cta { animation: none } }

  .statusline { padding: 10px 16px 0; display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 13px; color: var(--alert-deep); cursor: pointer; }
  .statusline.on { cursor: default; }
  .statusline.on { color: var(--on-deep); }
  .statusline .d { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .statusline .sub { font-weight: 400; font-size: 11.5px; color: var(--muted); }

  .stats { display: flex; gap: 8px; padding: 10px 16px 12px; }
  .stat { flex: 1; background: var(--card); border: 1px solid var(--rule); border-radius: 10px; padding: 9px 12px; }
  .stat .n { font-weight: 800; font-size: 17px; }
  .stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 1px; }

  .row-btn {
    display: flex; align-items: center; gap: 11px;
    width: calc(100% - 32px); margin: 0 16px 8px; padding: 10px 12px;
    background: var(--card); border: 1px solid var(--rule); border-radius: 11px;
    font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer; text-align: left;
    transition: border-color .15s, transform .05s, background .15s;
  }
  .row-btn:hover:not(:disabled) { border-color: #C9CCC7; background: #FDFDFC; }
  .row-btn:active:not(:disabled) { transform: scale(.985); }
  .row-btn:disabled { opacity: .5; cursor: default; }
  .row-btn .tile { flex: none; width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .row-btn .tile svg { width: 17px; height: 17px; }
  .row-btn.t-img .tile { background: var(--on-soft); color: var(--on-deep); }
  .row-btn.t-txt .tile { background: var(--purple-soft); color: var(--purple); }
  .row-btn.t-vid .tile { background: var(--coral-soft); color: var(--coral); }
  .row-btn .body { flex: 1; min-width: 0; }
  .row-btn .hint { display: block; font-weight: 400; font-size: 11px; color: var(--muted); margin-top: 1px; }
  .row-btn .chev { color: var(--muted); flex: none; }
  .row-btn.busy .tile { animation: pulse 1s ease infinite; }
  @keyframes pulse { 50% { opacity: .45 } }

  .tip { display: flex; gap: 8px; align-items: flex-start; margin: 4px 16px 12px; background: #EFF1EE; border-radius: 9px; padding: 9px 12px; }
  .tip svg { flex: none; width: 14px; height: 14px; color: var(--muted); margin-top: 1px; }
  .tip p { font-size: 11.5px; color: #52575C; line-height: 1.45; }

  .ledger { margin: 0 16px 10px; background: var(--card); border: 1px solid var(--rule); border-radius: 11px; padding: 12px; }
  .ledger h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; font-family: ui-monospace, monospace; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; border-radius: 4px; padding: 3px 7px; border: 1.5px solid; }
  .badge.confirmed { color: var(--alert-deep); border-color: var(--alert-deep); }
  .badge.unverified { color: var(--muted); border-color: var(--muted); }
  .badge.contested, .badge.disputed { color: #B45309; border-color: #B45309; }
  .badge.clean { color: var(--ok); border-color: var(--ok); }
  .counts { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .vrow { display: flex; gap: 6px; margin-top: 10px; }
  .vrow button { flex: 1; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 999px; padding: 6px 10px; border: 1.5px solid var(--rule); background: transparent; }
  .vrow .confirm { border-color: var(--alert); color: var(--alert); }
  .vrow .confirm.active { background: var(--alert); color: #fff; }
  .vrow .dispute { border-color: var(--muted); color: #52575C; }
  .vrow .dispute.active { background: var(--muted); color: #fff; }
  .vrow button:disabled { opacity: .4; cursor: default; }
  .srow { background: var(--paper); border: 1px solid var(--rule); border-radius: 8px; padding: 8px 10px; margin-top: 7px; }
  .srow b { font-size: 12.5px; }
  .srow .ev { display: block; color: var(--muted); font-size: 11.5px; margin-top: 2px; }
  .toast { margin: 0 16px 10px; font-size: 12px; color: var(--muted); text-align: center; min-height: 15px; }

  footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--rule); background: var(--card); padding: 9px 16px; }
  footer a { font-size: 11.5px; font-weight: 600; color: var(--on-deep); text-decoration: none; }
  footer a.plain { color: var(--muted); font-weight: 400; }
  footer .ver { font-size: 10px; color: #B4B2A9; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <header>
    <div class="wordmark">Arti<span>fake</span></div>
    <div class="hgroup">
      <div class="url" id="host"></div>
      <button class="cta" id="cta" hidden>Turn on →</button>
      <div class="power-wrap" id="pwrap">
        <svg class="ring" viewBox="0 0 42 42"><circle cx="21" cy="21" r="18.8"/></svg>
        <button class="power" id="power" aria-label="Toggle scanning">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round">
            <path d="M12 3v9"/><path d="M6.2 6.2a8 8 0 1 0 11.6 0"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="statusline" id="status"><span class="d"></span>Not scanning <span class="sub" id="statussub">· turn on to mark AI as you browse</span></div>

  <div class="stats">
    <div class="stat"><div class="n" id="st-pages">0</div><div class="l">pages scanned</div></div>
    <div class="stat"><div class="n" id="st-sigs">0</div><div class="l">signatures found</div></div>
  </div>

  <button class="row-btn t-img" id="imagescan">
    <span class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg></span>
    <span class="body">Scan images on this page<span class="hint">Checks the largest images you can see</span></span>
    <span class="chev">›</span>
  </button>

  <button class="row-btn t-txt" id="deepscan">
    <span class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6"/><path d="M9 17h6"/></svg></span>
    <span class="body">Scan this page's text<span class="hint">Looks for AI writing, quotes its evidence</span></span>
    <span class="chev">›</span>
  </button>

  <button class="row-btn t-vid" id="screenscan">
    <span class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="7" y="5" width="3.4" height="14" rx="1"/><rect x="13.6" y="5" width="3.4" height="14" rx="1"/></svg></span>
    <span class="body">Check a video<span class="hint">Tap while it plays — we watch about 10 seconds</span></span>
    <span class="chev">›</span>
  </button>

  <div class="tip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.4 1 2.3h6c0-.9.4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>
    <p>Hover or right-click any image on any site to scan it instantly</p>
  </div>

  <div class="ledger" id="scanresult" hidden>
    <h4>Screen analysis</h4>
    <div id="scanresult-body"></div>
  </div>

  <div class="ledger" id="ledger" hidden>
    <h4>Community record for this page</h4>
    <div id="ledger-body"></div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <a href="https://flagged-site.vercel.app/how-it-works.html" target="_blank" rel="noopener">How it works</a>
    <a class="plain" href="https://flagged-site.vercel.app" target="_blank" rel="noopener">artifake</a>
    <span class="ver" id="ver"></span>
  </footer>

  <script src="db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
