<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 132" role="img" aria-label="Artifake logo">
  <!-- flagpole rising through the A -->
  <rect x="56" y="6" width="8" height="120" rx="3" fill="#17191C"/>
  <!-- red pennant flying above the apex -->
  <path d="M64 8 L100 20 L64 32 Z" fill="#DC2626"/>
  <!-- the A: solid green peak, notched at the base where the pole passes -->
  <path d="M60 30 L14 126 L48 126 L48 110 L60 84 L72 110 L72 126 L106 126 Z" fill="#15803D"/>
  <!-- crossbar carved in negative space -->
  <rect x="38" y="88" width="44" height="10" rx="2" fill="#F6F7F5"/>
  <!-- pole highlight where it crosses the A -->
  <rect x="56" y="30" width="8" height="96" rx="3" fill="#FFFFFF" opacity="0.92"/>
</svg>
